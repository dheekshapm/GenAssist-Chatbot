apiVersion: apps/v1
kind: Deployment
metadata:
  name: genassist-deployment
  namespace: genassist
  labels:
    app: genassist
spec:
  replicas: 2
  selector:
    matchLabels:
      app: genassist
  template:
    metadata:
      labels:
        app: genassist
    spec:
      containers:
        - name: genassist
          image: genassist:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8501
          env:
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: genassist-secret
                  key: GROQ_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 5
