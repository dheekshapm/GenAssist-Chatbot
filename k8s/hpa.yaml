# Horizontal Pod Autoscaler — scales pods based on CPU load
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: genassist-hpa
  namespace: genassist
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: genassist-deployment
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
